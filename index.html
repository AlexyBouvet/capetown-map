var map = L.map('map').setView([-33.92, 18.42], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO',
  maxZoom: 19
}).addTo(map);

var markers = {};
var allMarkers = [];

function addPin(lat, lon, popup, color, cat) {
  var marker = L.circleMarker([lat, lon], {
    radius: 7, fillColor: color, color: '#fff', weight: 1.5,
    opacity: 1, fillOpacity: 0.85
  }).bindPopup(popup);
  marker._cat = cat;
  if (!markers[cat]) markers[cat] = [];
  markers[cat].push(marker);
  allMarkers.push(marker);
  marker.addTo(map);
}

function toggleCat(cat, show) {
  if (!markers[cat]) return;
  markers[cat].forEach(function(m) {
    if (show) m.addTo(map); else map.removeLayer(m);
  });
}
